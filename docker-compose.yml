services:
  joebot-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: joebot-lab:latest
    container_name: joebot-lab
    restart: unless-stopped
    network_mode: host
    environment:
      DASHBOARD_PORT: "8080"
      POLL_SECONDS: "10"
      SOCKET_TIMEOUT_SECONDS: "4"
      POLL_WORKERS: "16"
      CONFIG_DIR: "/app/config"
    volumes:
      - ./config:/app/config
